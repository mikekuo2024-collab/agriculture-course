<title>畜牧 線上學習評量</title><style>
:root{--navy:#1a1a2e;--accent:#1e6fbf;--line:#dde3ef;--bg:#f4f6fb;--ok:#1f9d55;--no:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:#1f2733;line-height:1.7;padding-bottom:90px}
.hero{background:linear-gradient(135deg,#1a1a2e,#2c3e6b 55%,#1e6fbf);color:#fff;padding:34px 20px;text-align:center}
.hero h1{font-size:1.6rem;font-weight:800}.hero p{color:#d7e3f5;margin-top:6px}
.wrap{max-width:860px;margin:0 auto;padding:24px 16px}
.q{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(30,40,80,.05)}
.qh{display:flex;gap:8px;align-items:baseline;margin-bottom:10px}.no{font-weight:800;color:var(--accent);flex:none}.stem{font-weight:600}
.tag{font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:6px}.tag.adv{background:#fdecea;color:#c0392b}.tag.multi{background:#e8f3ff;color:#1e6fbf}
.opt{display:flex;gap:9px;align-items:flex-start;padding:7px 10px;border:1px solid #eef1f7;border-radius:9px;margin:5px 0;cursor:pointer}.opt:hover{background:#f6f9ff}
.opt input{margin-top:4px}.opt.correct{background:#e9f9ef;border-color:#9fdcb6}.opt.wrong{background:#fdecea;border-color:#f0b4ab}
.exp{display:none;margin-top:10px;padding:10px 12px;background:#f4f7fc;border-left:4px solid var(--accent);border-radius:6px;font-size:.9rem}.exp.show{display:block}
.exp b.ok{color:var(--ok)}.exp b.no{color:var(--no)}
.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:12px;display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap}
button{font-family:inherit;font-weight:700;border:none;border-radius:24px;padding:11px 26px;cursor:pointer}.submit{background:var(--accent);color:#fff}.reset{background:#eef1f7}
.score{font-weight:800;color:var(--navy)}.scorebox{display:none;background:#fff;border:2px solid var(--accent);border-radius:14px;padding:18px;text-align:center;margin-bottom:16px}.scorebox.show{display:block}.scorebox .big{font-size:2.2rem;font-weight:800;color:var(--accent)}
@media print{.bar,.reset{display:none}}</style></head><body>
<div class="hero"><h1>畜牧 線上學習評量</h1><p>第10章畜牧 50 題自動計分（單選＋複選）（單選＋複選）</p></div>

<script>
const DATA=[{"no": 1, "type": "single", "level": "basic", "stem": "依課本，「經濟動物」是指下列何者？", "opts": ["不具經濟用途的動物", "野生保育類動物", "僅供觀賞的寵物", "經人類馴養、可大量繁殖並遺傳優良性能、具重大經濟價值的動物"], "ans": [3], "exp": "課本：經人類馴服飼養、可大量繁殖並將優良性能遺傳後代、具重大經濟價值者即家禽家畜，又稱經濟動物。"}, {"no": 2, "type": "multi", "level": "basic", "stem": "（複選題）依農委會公布，下列何者屬於「法定家禽」？", "opts": ["雞", "豬", "鴨", "鴕鳥"], "ans": [0, 2, 3], "exp": "法定家禽為雞、鴨、鵝、火雞、鴕鳥；豬屬法定家畜。"}, {"no": 3, "type": "single", "level": "basic", "stem": "下列何者『不是』課本所列的法定家畜？", "opts": ["雞", "兔", "豬", "牛"], "ans": [0], "exp": "法定家畜為豬、牛、羊、鹿、兔、馬；雞屬法定家禽。"}, {"no": 4, "type": "single", "level": "basic", "stem": "台灣市場約 94% 的蛋雞是哪種雞的雜交後裔？", "opts": ["烏骨雞", "蘆花雞", "紅羽土雞", "白色來航雞"], "ans": [3], "exp": "課本：台灣市場94%蛋雞為白色來航雞（Leghorn，產白殼蛋）不同品系雜交後裔。"}, {"no": 5, "type": "single", "level": "basic", "stem": "雞產蛋後會築巢孵化並停止產蛋的繁殖本能稱為？", "opts": ["換羽", "就巢性（賴孵）", "反芻", "啄羽"], "ans": [1], "exp": "課本：就巢性（賴孵）是雞的繁殖本能；蛋用雞不希望有此行為以免降低產蛋率。"}, {"no": 6, "type": "single", "level": "basic", "stem": "番鴨因面部有紅色肉疣，又稱下列何者？（薑母鴨常用食材）", "opts": ["櫻桃谷鴨", "菜鴨", "紅面鴨", "改鴨"], "ans": [2], "exp": "課本：番鴨（Muscovy）面部有紅色肉疣，稱紅面鴨/麝香鴨，薑母鴨常用食材。"}, {"no": 7, "type": "single", "level": "adv", "stem": "★進階：土番鴨（母菜鴨×公番鴨）因「屬間雜交」而不具生殖能力，又稱為？", "opts": ["北京鴨", "騾鴨", "菜鴨", "改鴨"], "ans": [1], "exp": "課本：土番鴨為屬間雜交，不具生殖能力，又被稱為「騾鴨」。"}, {"no": 8, "type": "single", "level": "basic", "stem": "豬在動物分類上屬於下列何者？", "opts": ["單蹄、反芻、多胎", "單蹄、不反芻、單胎", "偶蹄、反芻、單胎", "偶蹄、非反芻、多胎"], "ans": [3], "exp": "課本：豬是偶蹄、非反芻類、多胎動物。"}, {"no": 9, "type": "single", "level": "basic", "stem": "三品種雜交豬（LYD）的「終端公豬」是下列哪一品種？", "opts": ["杜洛克", "約克夏", "桃園豬", "藍瑞斯"], "ans": [0], "exp": "課本：藍瑞斯(L)為母系，杜洛克(D，體毛紅棕、耳端前傾)為三品種雜交終端公豬。"}, {"no": 10, "type": "multi", "level": "basic", "stem": "（複選題）下列何者為台灣本土豬種？", "opts": ["蘭嶼系迷你豬", "畜試黑豬1號", "杜洛克", "桃園豬"], "ans": [0, 1, 3], "exp": "桃園豬、蘭嶼迷你豬為本土保護品種，畜試黑豬1號為本土育成；杜洛克為國外引進種。"}, {"no": 11, "type": "single", "level": "basic", "stem": "牛的複胃分四部分，其中又稱「真胃」的是？", "opts": ["蜂巢胃", "重瓣胃", "皺胃", "瘤胃"], "ans": [2], "exp": "課本：複胃分瘤胃、蜂巢胃、重瓣胃、皺胃（或稱真胃）。"}, {"no": 12, "type": "single", "level": "basic", "stem": "台灣乳用牛以哪一品種為主？（體軀最大、產乳量最高）", "opts": ["安格斯牛", "台灣黃牛", "荷蘭牛", "娟姍牛"], "ans": [2], "exp": "課本：荷蘭牛（Holstein）在乳牛中體軀最大、產乳量最高，是台灣乳用牛主力。"}, {"no": 13, "type": "single", "level": "adv", "stem": "★進階：所有乳用牛中「乳脂率最高、體型最小」，適合做乳酪起司的是？", "opts": ["安格斯牛", "乳用短角牛", "荷蘭牛", "娟姍牛"], "ans": [3], "exp": "課本：娟姍牛（Jersey）體型最小、乳脂率最高，適合做乳酪及起司。"}, {"no": 14, "type": "single", "level": "basic", "stem": "全世界第一種經由選育而成的理想肉用山羊品種是？", "opts": ["阿爾拜因", "撒能", "奴比亞", "波爾山羊"], "ans": [3], "exp": "課本：波爾山羊（Boer）被譽為全世界第一種經選育而成的理想肉用品種。"}, {"no": 15, "type": "single", "level": "basic", "stem": "★進階：全世界第一隻複製羊「桃莉」是下列哪一綿羊品種？", "opts": ["波爾山羊", "美利奴", "黑肚綿羊", "杜色特"], "ans": [3], "exp": "課本：杜色特（Dorset）為複製羊桃莉的品種，臉耳四肢白色，有白面綿羊之稱。"}, {"no": 16, "type": "single", "level": "basic", "stem": "兔子在消化上的特徵是下列何者？", "opts": ["偶蹄、非反芻、多胃", "草食、非反芻、單胃、盲腸發達", "偶蹄、反芻、複胃", "單蹄、反芻、單胃"], "ans": [1], "exp": "課本：兔為草食、非反芻獸、單胃，盲腸發達可分解粗纖維，具假反芻行為。"}, {"no": 17, "type": "single", "level": "basic", "stem": "馬在動物分類上屬於？", "opts": ["單蹄、反芻、複胃", "單蹄、不反芻、盲腸發達", "偶蹄、非反芻、複胃", "偶蹄、反芻"], "ans": [1], "exp": "課本：馬為單蹄、不反芻的單胃動物，盲腸發達可分解粗纖維，家畜中飼養最少。"}, {"no": 18, "type": "single", "level": "basic", "stem": "依課本，2017 年台灣畜產業年產值約占農業生產總值的比例是？", "opts": ["約 50%", "約 15%", "約 32.22%", "約 6%"], "ans": [2], "exp": "課本：畜產業年產值1,654億元，占農業總產值5,138億的32.22%。"}, {"no": 19, "type": "single", "level": "basic", "stem": "★進階：依課本，單項農產品產值第一位的是？", "opts": ["雞蛋", "家禽", "水稻", "毛豬"], "ans": [3], "exp": "課本：毛豬714億居農業產值第一，家禽421億次之，水稻380億第三，雞蛋231億第四。"}, {"no": 20, "type": "multi", "level": "basic", "stem": "（複選題）畜牧對台灣的重要性可從哪些角度說明？", "opts": ["經濟角度", "軍事角度", "生態角度", "民生角度"], "ans": [0, 2, 3], "exp": "課本從經濟、民生、生態三種角度說明畜牧的重要性。"}, {"no": 21, "type": "single", "level": "basic", "stem": "下列何者『不屬於』禽畜的六大營養素？", "opts": ["蛋白質", "礦物質", "碳水化合物", "抗生素"], "ans": [3], "exp": "課本六大營養素：碳水化合物、蛋白質、脂肪、維生素、礦物質、水。抗生素非營養素。"}, {"no": 22, "type": "single", "level": "adv", "stem": "★進階：脂類（脂肪）每單位重量所含能量約為碳水化合物的幾倍？", "opts": ["2.25 倍", "5 倍", "1.5 倍", "1 倍"], "ans": [0], "exp": "課本：脂類每單位重量所含能量為碳水化合物的2.25倍，是主要能量來源。"}, {"no": 23, "type": "multi", "level": "basic", "stem": "（複選題）下列何者屬於「脂溶性維生素」？", "opts": ["維生素D", "維生素K", "維生素A", "維生素C"], "ans": [0, 1, 2], "exp": "課本：脂溶性維生素為A、D、E、K；維生素C屬水溶性。"}, {"no": 24, "type": "single", "level": "basic", "stem": "動物若缺乏維生素B1，最易罹患下列何種疾病？", "opts": ["佝僂症", "腳氣病（神經炎）", "壞血病", "夜盲症"], "ans": [1], "exp": "課本：缺乏維生素B1易罹患神經炎和腳氣病；缺A→夜盲、缺D→軟骨/佝僂、缺C→壞血病。"}, {"no": 25, "type": "single", "level": "adv", "stem": "★進階：牛飼料添加尿素是為了部分代替下列何種成分？（課本原題）", "opts": ["礦物質", "蛋白質", "脂肪", "碳水化合物"], "ans": [1], "exp": "課本：尿素含氮>46%，牛瘤胃細菌可將氮代謝合成胺基酸，故可代替部分蛋白質（過量中毒）。"}, {"no": 26, "type": "single", "level": "basic", "stem": "在各種牧草中產量最高、又稱「象草」的是？", "opts": ["狼尾草", "盤固草", "尼羅草", "苜蓿"], "ans": [0], "exp": "課本：狼尾草（象草）體型高大、在各種牧草中產量最高。"}, {"no": 27, "type": "single", "level": "basic", "stem": "被稱為「牧草之后」、蛋白質含量最高的豆科牧草是？", "opts": ["苜蓿", "狼尾草", "天竺草", "盤固草"], "ans": [0], "exp": "課本：苜蓿為羽狀三小葉，蛋白質含量最高，有「牧草之后」之稱。"}, {"no": 28, "type": "single", "level": "basic", "stem": "★進階：豆科牧草根部的「根瘤菌」主要作用是？", "opts": ["儲存水分", "吸收（固定）土壤中的游離氮", "產生乳酸", "分解粗纖維"], "ans": [1], "exp": "課本：豆科植物根部具根瘤菌，可吸收土壤內的游離氮，故豆科蛋白質含量較高。"}, {"no": 29, "type": "single", "level": "basic", "stem": "關於母禽生殖器官，下列敘述何者正確？", "opts": ["右側輸卵管形成蛋殼", "雞蛋主要在卵巢形成", "左右兩側卵巢都有功能", "僅左側卵巢及輸卵管有功能"], "ans": [3], "exp": "課本：母禽僅左側卵巢有功能，輸卵管為形成雞蛋的主要場所，且僅左側有功能。"}, {"no": 30, "type": "single", "level": "basic", "stem": "家禽種蛋胚胎發育的臨界溫度是？", "opts": ["23.9℃", "37.5℃", "10℃", "18.3℃"], "ans": [0], "exp": "課本：家禽種蛋胚胎發育臨界溫度為23.9℃，須保存於其下以免加速發育。"}, {"no": 31, "type": "single", "level": "basic", "stem": "依課本表10-3，下列家禽孵化天數何者正確？", "opts": ["番鴨 21 天", "雞 28 天", "鵝 30 天", "鴕鳥 21 天"], "ans": [2], "exp": "課本表10-3：雞21、鴨/火雞28、鵝30、番鴨35、鴕鳥42天。"}, {"no": 32, "type": "single", "level": "adv", "stem": "★進階（課本原題）：進行「照蛋」的主要目的是？", "opts": ["增加蛋的溫度", "使小雞提早孵化", "檢視雞蛋內胚胎是否有發育", "增加孵化室通風"], "ans": [2], "exp": "課本原題：照蛋（檢蛋）目的是檢視胚胎發育程度，去除無精蛋與終止蛋。"}, {"no": 33, "type": "single", "level": "basic", "stem": "孵化過程中「翻蛋」的角度與次數，依課本為？",
