<title>農業概論下冊 線上學習評量</title><style>
:root{--navy:#1a1a2e;--accent:#1e6fbf;--line:#dde3ef;--bg:#f4f6fb;--ok:#1f9d55;--no:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:#1f2733;line-height:1.7;padding-bottom:90px}
.hero{background:linear-gradient(135deg,#1a1a2e,#2c3e6b 55%,#1e6fbf);color:#fff;padding:34px 20px;text-align:center}
.hero h1{font-size:1.6rem;font-weight:800}.hero p{color:#d7e3f5;margin-top:6px}
.wrap{max-width:860px;margin:0 auto;padding:24px 16px}
.q{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(30,40,80,.05)}
.qh{display:flex;gap:8px;align-items:baseline;margin-bottom:10px}.no{font-weight:800;color:var(--accent);flex:none}.stem{font-weight:600}
.tag{font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:6px}.tag.adv{background:#fdecea;color:#c0392b}.tag.multi{background:#e8f3ff;color:#1e6fbf}
.opt{display:flex;gap:9px;align-items:flex-start;padding:7px 10px;border:1px solid #eef1f7;border-radius:9px;margin:5px 0;cursor:pointer}.opt:hover{background:#f6f9ff}
.opt input{margin-top:4px}.opt.correct{background:#e9f9ef;border-color:#9fdcb6}.opt.wrong{background:#fdecea;border-color:#f0b4ab}
.exp{display:none;margin-top:10px;padding:10px 12px;background:#f4f7fc;border-left:4px solid var(--accent);border-radius:6px;font-size:.9rem}.exp.show{display:block}
.exp b.ok{color:var(--ok)}.exp b.no{color:var(--no)}
.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:12px;display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap}
button{font-family:inherit;font-weight:700;border:none;border-radius:24px;padding:11px 26px;cursor:pointer}.submit{background:var(--accent);color:#fff}.reset{background:#eef1f7}
.score{font-weight:800;color:var(--navy)}.scorebox{display:none;background:#fff;border:2px solid var(--accent);border-radius:14px;padding:18px;text-align:center;margin-bottom:16px}.scorebox.show{display:block}.scorebox .big{font-size:2.2rem;font-weight:800;color:var(--accent)}
@media print{.bar,.reset{display:none}}</style></head><body>
<div class="hero"><h1>農業概論下冊 線上學習評量</h1><p>50 題自動計分複習測驗（單選＋複選）</p></div>

<script>
const DATA=[{"no": 1, "type": "single", "level": "basic", "stem": "森林經營的最高指導原則是下列何者？", "opts": ["皆伐求最大利潤", "開發為建地", "保續收穫（永續收穫）", "完全不使用森林"], "ans": [2], "exp": "教材第8章指出森林經營以「保續收穫」為最高指導原則，兼顧保育、公益、經濟與永續。"}, {"no": 2, "type": "single", "level": "basic", "stem": "下列何者『不是』森林的主要功能？", "opts": ["生產功能", "生態功能", "生活遊憩功能", "軍事攻擊功能"], "ans": [3], "exp": "森林具生產、生態、生活（遊憩）等多目標功能，並無「軍事攻擊」功能。"}, {"no": 3, "type": "single", "level": "basic", "stem": "「永續收穫經營」對採伐量與生長量的關係要求是？", "opts": ["採伐量大於生長量", "採伐量不超過生長量", "兩者無關", "採伐量必為零"], "ans": [1], "exp": "採伐量控制在年生長量之內，森林蓄積不減少，才能永續產出，如同只花利息不動本金。"}, {"no": 4, "type": "single", "level": "basic", "stem": "下列何者『不屬於』木材的性質？", "opts": ["物理性質", "力學性質", "化學性質", "政治性質"], "ans": [3], "exp": "木材有外觀、物理、力學、化學等性質，並無「政治性質」。"}, {"no": 5, "type": "single", "level": "basic", "stem": "木材乾燥、防腐、膠合、塗裝屬於下列何者？", "opts": ["林木的採運", "樹苗的育苗", "木材的加工處理", "森林的造林"], "ans": [2], "exp": "乾燥、防腐、膠合、塗裝都是木材採伐後的加工處理，可提高利用價值與耐久性。"}, {"no": 6, "type": "single", "level": "basic", "stem": "由多層薄木片交錯膠合而成的板材稱為？", "opts": ["實木板", "石膏板", "合板", "玻璃板"], "ans": [2], "exp": "合板（夾板）由薄木片交錯膠合而成，強度高、不易變形，是常見的人造木板。"}, {"no": 7, "type": "multi", "level": "adv", "stem": "（複選題）下列何者符合「永續收穫經營」的精神？", "opts": ["年採伐量不超過年生長量", "推動多目標經營", "皆伐後不再更新造林", "兼顧公益性與生態保育"], "ans": [0, 1, 3], "exp": "(C) 皆伐後不更新會破壞永續，違反精神；其餘皆符合永續收穫經營。"}, {"no": 8, "type": "single", "level": "adv", "stem": "★進階：某林場每年木材生長量約 1 萬立方公尺，欲永續經營，每年採伐量最多約多少？", "opts": ["5 千立方公尺", "1 萬立方公尺", "1.5 萬立方公尺", "2 萬立方公尺"], "ans": [1], "exp": "永續收穫要求採伐量≤生長量，故每年最多可採伐約 1 萬立方公尺（與生長量相等）。"}, {"no": 9, "type": "single", "level": "basic", "stem": "下列何者『不是』漁業的生產類型？", "opts": ["海洋漁業", "內陸漁業", "養殖漁業", "太空漁業"], "ans": [3], "exp": "漁業生產分海洋漁業、內陸漁業與養殖漁業，沒有「太空漁業」。"}, {"no": 10, "type": "single", "level": "basic", "stem": "水產養殖依水源可分為淡水養殖與下列何者？", "opts": ["高山養殖", "鹹水養殖", "沙漠養殖", "空中養殖"], "ans": [1], "exp": "養殖依水源分為淡水養殖與鹹水（海水）養殖兩大類。"}, {"no": 11, "type": "single", "level": "basic", "stem": "下列何者是影響養殖魚類存活最直接的水質指標？", "opts": ["水的顏色", "岸邊植物", "溶氧量", "池底磚色"], "ans": [2], "exp": "溶氧不足會使魚類窒息死亡，是養殖水質管理最關鍵的指標之一。"}, {"no": 12, "type": "single", "level": "basic", "stem": "下列何者是台灣重要的養殖魚種？", "opts": ["北極熊", "虱目魚", "企鵝", "駱駝"], "ans": [1], "exp": "虱目魚是台灣代表性的養殖魚種，另有吳郭魚、鰻魚、石斑等。"}, {"no": 13, "type": "single", "level": "adv", "stem": "★進階：養殖池若長時間溶氧過低，最可能發生下列何種情況？", "opts": ["魚類窒息大量死亡", "魚類生長更快", "水質自動變好", "氨氮自動下降"], "ans": [0], "exp": "溶氧過低會造成魚類缺氧窒息、甚至整池暴斃，須靠換水或打氣增氧改善。"}, {"no": 14, "type": "multi", "level": "basic", "stem": "（複選題）水產養殖管理的重點包含下列哪些？", "opts": ["水溫控制", "水質監測", "放養密度", "魚病防治"], "ans": [0, 1, 2, 3], "exp": "水溫、水質（溶氧、氨氮）、放養密度與魚病防治都是養殖管理的重點。"}, {"no": 15, "type": "single", "level": "basic", "stem": "養殖水中對魚類有毒、需嚴格控制的含氮代謝物主要是？", "opts": ["氧氣", "氨氮", "氮氣", "二氧化碳"], "ans": [1], "exp": "魚體與殘餌分解會產生氨氮（NH3），濃度過高對魚有毒，需換水稀釋或以微生物分解。"}, {"no": 16, "type": "single", "level": "basic", "stem": "下列何者『不屬於』畜牧的工作範圍？", "opts": ["禽畜飼養", "禽畜繁殖", "禽畜衛生管理", "林木採伐"], "ans": [3], "exp": "畜牧涵蓋禽畜的生長、營養、飼料、繁殖與衛生管理；林木採伐屬林業。"}, {"no": 17, "type": "single", "level": "basic", "stem": "禽畜防疫中，阻止病原進入場區的第一道、也是最關鍵防線稱為？", "opts": ["生物防堵", "撲殺", "生物阻絕", "疫苗接種"], "ans": [2], "exp": "生物阻絕（Bio-exclusion）阻止病原進場，是生物安全三層防護中第一且最關鍵者。"}, {"no": 18, "type": "multi", "level": "basic", "stem": "（複選題）下列何者屬於農場生物安全的具體措施？", "opts": ["人車進場消毒", "劃分潔淨區與污染區", "隔離檢疫新引入動物", "開放遊客自由進出畜舍"], "ans": [0, 1, 2], "exp": "(D) 開放自由進出會帶入病原，違反生物安全；其餘皆為正確措施。"}, {"no": 19, "type": "single", "level": "basic", "stem": "牛、羊等反芻動物能消化牧草纖維，主要靠哪個特有構造？", "opts": ["瘤胃", "盲腸", "肝臟", "牙齒"], "ans": [0], "exp": "反芻動物的瘤胃含大量微生物，能發酵分解纖維素，是其消化特徵。"}, {"no": 20, "type": "single", "level": "basic", "stem": "生物安全的三層防護不包含下列何者？", "opts": ["生物阻絕", "生物管理", "生物防堵", "生物發電"], "ans": [3], "exp": "三層防護為生物阻絕、生物管理、生物防堵，沒有「生物發電」。"}, {"no": 21, "type": "single", "level": "adv", "stem": "★進階：關於非洲豬瘟防疫，下列敘述何者正確？", "opts": ["廚餘須經高溫蒸煮才可餵飼", "病死豬可隨意棄置", "畜舍完全不需消毒", "開放車輛自由進出豬場"], "ans": [0], "exp": "廚餘養豬須高溫蒸煮以殺滅病毒；病死豬須通報化製，並落實消毒與人車管制。"}, {"no": 22, "type": "single", "level": "basic", "stem": "禽畜生長所需的養分主要來自下列何者？", "opts": ["陽光", "土壤", "飼料", "清水"], "ans": [2], "exp": "禽畜靠攝取飼料獲得蛋白質、能量與礦物質等養分以維持生長。"}, {"no": 23, "type": "multi", "level": "basic", "stem": "（複選題）維持禽畜健康的正確作法包含下列哪些？", "opts": ["按時疫苗接種", "畜舍清潔消毒", "提供適當營養", "與病畜長期混養"], "ans": [0, 1, 2], "exp": "(D) 與病畜混養會傳播疾病；疫苗、消毒與營養才是正確作法。"}, {"no": 24, "type": "single", "level": "basic", "stem": "農產加工最主要的目的是下列何者？", "opts": ["使食物更快腐敗", "提高貯藏性與利用價值", "降低營養價值", "為產品灌水增重"], "ans": [1], "exp": "加工的核心目的是提高貯藏性、附加價值、嗜好性、衛生性與營養價值。"}, {"no": 25, "type": "single", "level": "basic", "stem": "下列何者『不是』農產加工的保存原理？", "opts": ["增加濕度促進發霉", "降低水分含量", "低溫保存", "加熱殺菌密封"], "ans": [0], "exp": "加工是要抑制微生物；增加濕度會促進腐敗，與保存目的相反。"}, {"no": 26, "type": "single", "level": "basic", "stem": "泡菜、優酪乳、豆瓣醬主要是利用哪一種加工方式製成？", "opts": ["冷凍", "打蠟", "發酵", "染色"], "ans": [2], "exp": "發酵利用益菌產生有機酸、降低 pH，抑制腐敗菌，是傳統的保存加工方法。"}, {"no": 27, "type": "single", "level": "basic", "stem": "罐頭食品能長期保存，主要是靠下列何種原理？", "opts": ["只靠冷凍", "加熱殺菌後密封隔絕", "只靠曬乾", "加水稀釋"], "ans": [1], "exp": "罐頭經加熱殺菌後密封，隔絕空氣與微生物再污染，故能常溫長期保存。"}, {"no": 28, "type": "multi", "level": "basic", "stem": "（複選題）下列哪些屬於「降低水分」的加工保存方法？", "opts": ["日曬", "烘乾", "脫水", "冷凍"], "ans": [0, 1, 2], "exp": "(D) 冷凍是低溫保存、非降低水分；日曬、烘乾、脫水皆為降低水分。"}, {"no": 29, "type": "single", "level": "adv", "stem": "★進階：發酵之所以能防腐，主要是因為？", "opts": ["產生有機酸使 pH 降低而抑菌", "使 pH 大幅升高", "增加食品水分", "提高保存溫度"], "ans": [0], "exp": "發酵菌代謝產生乳酸、醋酸等有機酸，降低 pH，多數腐敗菌無法生存。"}, {"no": 30, "type": "single", "level": "basic", "stem": "下列何者『不是』農產加工的作物對象？", "opts": ["農藝作物", "園藝作物", "水產作物", "金屬礦石"], "ans": [3], "exp": "農產加工對象含農藝、園藝、林產、畜產、水產五大作物，礦石不屬農產。"}, {"no": 31, "type": "single", "level": "basic", "stem": "加工「提高附加價值」是指下列何者？", "opts": ["將產品直接丟棄", "刻意降低品質", "減少可利用種類", "加工後價格與利用價值提高"], "ans": [3], "exp": "例如鮮乳製成起司、水果製成果醬，售價與用途提升，即提高附加價值。"}, {"no": 32, "type": "multi", "level": "adv", "stem": "★進階（複選題）下列加工方式與其抑制腐敗原理，配對正確的有哪些？", "opts": ["冷凍→抑制微生物活動", "煙燻→兼具乾燥與抑菌", "醃漬→高鹽或降 pH 抑菌", "增濕→抑制微生物"], "ans": [0, 1, 2], "exp": "(D) 增濕會促進微生物生長；冷凍、煙燻、醃漬皆能正確抑制腐敗。"}, {"no": 33, "type": "single", "level": "basic", "stem": "下列何者『不屬於』農產運銷的內容？", "opts": ["農產品行銷", "運銷職能", "批發市場與價格", "森林皆伐"], "ans": [3], "exp": "農產運銷含行銷、運銷職能、批發市場、價格形成與農產品認證；森林皆伐屬林業。"}, {"no": 34, "type": "single", "level": "basic", "stem": "有機農業最主要的特徵是下列何者？", "opts": ["大量使用化學肥料", "不使用化學合成農藥與化肥", "廣泛採用基因改造", "隨意噴灑農藥"], "ans": [1], "exp": "有機農業遵循自然循環，禁用化學合成農藥、化肥與基因改造生物。"}, {"no": 35, "type": "single", "level": "basic", "stem": "農產品要合法標示「有機」販售，必須先做到下列何者？", "opts": ["自行口頭宣稱", "通過驗證機構驗證取得標章", "向鄰居登記", "只要不灑農藥即可"], "ans": [1], "exp": "依《有機農業促進法》，須經第三方驗證機構驗證合格並取得有機標章。"}, {"no": 36, "type": "multi", "level": "basic", "stem": "（複選題）下列何者屬於有機農業的正確作法？", "opts": ["禁用化學合成農藥", "禁用化學肥料", "田區設隔離帶防污染", "使用基因改造種子"], "ans": [0, 1, 2], "exp": "(D) 有機禁用基因改造生物；其餘皆為有機農業的正確作法。"}, {"no": 37, "type": "single", "level": "basic", "stem": "永續農業的三大支柱『不包含』下列何者？", "opts": ["環境永續", "經濟可行", "社會公平", "軍事擴張"], "ans": [3], "exp": "永續農業三大支柱為環境永續、經濟可行、社會公平，兼顧當代與後代。"}, {"no": 38, "type": "single", "level": "adv", "stem": "★進階：病蟲害綜合管理（IPM）的核心精神是？", "opts": ["綜合多種方法、減少化學農藥依賴", "只使用化學農藥", "完全放任不管", "盡量增加農藥用量"], "ans": [0], "exp": "IPM 結合生物、耕作、物理與必要時的化學防治，把農藥用量降到最低，兼顧永續。"}, {"no": 39, "type": "single", "level": "basic", "stem": "結合農業生產與觀光休憩的經營型態稱為？", "opts": ["重工業", "礦業", "休閒農業", "證券業"], "ans": [2], "exp": "休閒農業結合農業與觀光、體驗、教育，是農業經營多角化的型態之一。"}, {"no": 40, "type": "multi", "level": "basic", "stem": "（複選題）下列何者屬於支撐農業營運的機制？", "opts": ["農業金融", "農業保險", "農場管理", "放棄任何記帳"], "ans": [0, 1, 2], "exp": "(D) 放棄記帳不利經營；農業金融、保險與農場管理都是重要支撐機制。"}, {"no": 41, "type": "single", "level": "adv", "stem": "★進階：有機農田的土壤通常需淨空（停用化學物質）多久才較符合驗證要求？", "opts": ["約 3 天", "約 3 個月", "約 3 年", "完全不需要"], "ans": [2], "exp": "有機驗證要求田區土壤經過約 3 年的轉型淨空期，並設隔離帶防止鄰田污染。"}, {"no": 42, "type": "single", "level": "basic", "stem": "下列何者是台灣的農民團體？", "opts": ["科技公司", "百貨公司", "證券商", "農會"], "ans": [3], "exp": "農會、合作社、農田水利會等都是服務農民的農民團體。"}, {"no": 43, "type": "single", "level": "basic", "stem": "把新農業技術與知識帶到田間、教導農民的體系稱為？", "opts": ["農業推廣", "軍事訓練", "都市計畫", "證券交易"], "ans": [0], "exp": "農業推廣透過教育、示範與輔導，把新技術帶給農民，促進農業發展。"}, {"no": 44, "type": "multi", "leve
